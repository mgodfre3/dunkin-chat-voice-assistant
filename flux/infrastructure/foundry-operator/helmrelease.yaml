apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foundry-local-operator
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: foundry-local-operator
  dependsOn:
    - name: cert-manager
    - name: trust-manager
  chart:
    spec:
      chart: inference-operator
      version: "0.0.1-prp.5"
      sourceRef:
        kind: HelmRepository
        name: foundry-local-mcr
  install:
    createNamespace: true
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
