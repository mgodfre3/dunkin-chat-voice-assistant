apiVersion: apps/v1
kind: Deployment
metadata:
  name: dunkin-voice-assistant
  namespace: dunkin-voice
  labels:
    app: dunkin-voice-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dunkin-voice-assistant
  template:
    metadata:
      labels:
        app: dunkin-voice-assistant
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        kubernetes.io/hostname: moc-lz6y09d1r1r
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: dunkin-voice
          image: cadunkinacr.azurecr.io/dunkin-voice-assistant:slim-v1
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: dunkin-config
            - secretRef:
                name: dunkin-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: tls-proxy
          image: nginx:alpine
          ports:
            - containerPort: 443
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/nginx/ssl
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
      volumes:
        - name: tls-certs
          secret:
            secretName: dunkin-tls
        - name: nginx-conf
          configMap:
            name: nginx-tls-config
