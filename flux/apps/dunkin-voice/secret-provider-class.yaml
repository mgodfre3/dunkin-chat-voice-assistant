apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dunkin-keyvault-secrets
  namespace: dunkin-voice
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Populate via Kustomize patches per cluster:
    #   userAssignedIdentityID: "<AKS_MANAGED_IDENTITY_CLIENT_ID>"
    #   keyvaultName: "<AZURE_KEYVAULT_NAME>"
    #   tenantId: "<AZURE_TENANT_ID>"
    userAssignedIdentityID: "PLACEHOLDER"
    keyvaultName: "PLACEHOLDER"
    tenantId: "PLACEHOLDER"
    objects: |
      array:
        - |
          objectName: azure-openai-endpoint
          objectType: secret
          objectAlias: AZURE_OPENAI_EASTUS2_ENDPOINT
        - |
          objectName: azure-openai-api-key
          objectType: secret
          objectAlias: AZURE_OPENAI_EASTUS2_API_KEY
  secretObjects:
    - secretName: dunkin-keyvault-synced
      type: Opaque
      data:
        - objectName: AZURE_OPENAI_EASTUS2_ENDPOINT
          key: AZURE_OPENAI_EASTUS2_ENDPOINT
        - objectName: AZURE_OPENAI_EASTUS2_API_KEY
          key: AZURE_OPENAI_EASTUS2_API_KEY
