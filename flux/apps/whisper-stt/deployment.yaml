apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper-stt
  namespace: dunkin-voice
  labels:
    app.kubernetes.io/name: whisper-stt
    app.kubernetes.io/component: speech-to-text
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: whisper-stt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whisper-stt
        app.kubernetes.io/component: speech-to-text
    spec:
      # Colocate with Phi-4 on GPU node (VXLAN cross-node networking broken)
      nodeSelector:
        kubernetes.io/hostname: moc-lz6y09d1r1r
      containers:
        - name: whisper
          image: fedirz/faster-whisper-server:latest-cuda
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: WHISPER__MODEL
              value: "Systran/faster-whisper-small"
            - name: WHISPER__INFERENCE_DEVICE
              value: "cpu"
            - name: WHISPER__COMPUTE_TYPE
              value: "int8"
            - name: PRELOAD_MODELS
              value: '["Systran/faster-whisper-small"]'
            - name: WHISPER__TTL
              value: "-1"
            - name: DEFAULT_LANGUAGE
              value: "en"
            - name: HF_HUB_OFFLINE
              value: "0"
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "3"
              memory: "4Gi"
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
