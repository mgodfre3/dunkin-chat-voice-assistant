apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper-stt
  namespace: dunkin-voice
  labels:
    app.kubernetes.io/name: whisper-stt
    app.kubernetes.io/component: speech-to-text
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: whisper-stt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whisper-stt
        app.kubernetes.io/component: speech-to-text
    spec:
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: whisper
          image: fedirz/faster-whisper-server:latest-cuda
          ports:
            - containerPort: 8000
              name: http
          env:
            # Use large-v3-turbo for best speed/quality tradeoff on edge
            - name: WHISPER__MODEL
              value: "Systran/faster-whisper-large-v3-turbo"
            - name: WHISPER__INFERENCE_DEVICE
              value: "cuda"
            - name: WHISPER__COMPUTE_TYPE
              value: "float16"
            # Preload model at startup, never unload (-1 = keep in memory forever)
            - name: PRELOAD_MODELS
              value: '["Systran/faster-whisper-large-v3-turbo"]'
            - name: WHISPER__TTL
              value: "-1"
            - name: DEFAULT_LANGUAGE
              value: "en"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
              nvidia.com/gpu: 1
            limits:
              cpu: "4"
              memory: "4Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
