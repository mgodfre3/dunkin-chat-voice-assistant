apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: dunkin-voice-gitops
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/mgodfre3/dunkin-chat-voice-assistant
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: dunkin-voice-gitops
  path: ./flux/infrastructure
  prune: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  dependsOn:
    - name: infra
  sourceRef:
    kind: GitRepository
    name: dunkin-voice-gitops
  path: ./flux/apps
  prune: true
  timeout: 5m
