apiVersion: apps/v1
kind: Deployment
metadata:
  name: dunkin-voice-assistant
  namespace: dunkin-voice
  labels:
    app: dunkin-voice-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dunkin-voice-assistant
  template:
    metadata:
      labels:
        app: dunkin-voice-assistant
    spec:
      containers:
        - name: dunkin-voice
          image: <your-acr>.azurecr.io/dunkin-voice-assistant:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: dunkin-config
            - secretRef:
                name: dunkin-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: dunkin-voice-service
  namespace: dunkin-voice
spec:
  type: LoadBalancer
  selector:
    app: dunkin-voice-assistant
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
