apiVersion: apps/v1
kind: Deployment
metadata:
  name: dunkin-voice-assistant
  namespace: dunkin-voice
  labels:
    app: dunkin-voice-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dunkin-voice-assistant
  template:
    metadata:
      labels:
        app: dunkin-voice-assistant
    spec:
      containers:
        - name: dunkin-voice
          image: ${AZURE_ACR_NAME}.azurecr.io/${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: dunkin-config
            # Secrets synced from Key Vault via CSI driver
            - secretRef:
                name: dunkin-keyvault-synced
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            # CSI driver mount — triggers secret sync from Key Vault
            - name: keyvault-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: keyvault-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: dunkin-keyvault-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: dunkin-voice-service
  namespace: dunkin-voice
spec:
  type: LoadBalancer
  selector:
    app: dunkin-voice-assistant
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
