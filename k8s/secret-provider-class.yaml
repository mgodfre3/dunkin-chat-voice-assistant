# SecretProviderClass — mounts Azure Key Vault secrets into pods via CSI driver.
# Requires: Azure Key Vault Provider for Secrets Store CSI Driver installed on the cluster.
#
# Secrets stored in Key Vault:
#   - azure-openai-endpoint    → AZURE_OPENAI_EASTUS2_ENDPOINT
#   - azure-openai-api-key     → AZURE_OPENAI_EASTUS2_API_KEY
#
# The CSI driver uses a managed identity (workload identity or user-assigned MI)
# granted "Key Vault Secrets User" role on the Key Vault.

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: dunkin-keyvault-secrets
  namespace: dunkin-voice
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Client ID of the managed identity with Key Vault access
    userAssignedIdentityID: "${AKS_MANAGED_IDENTITY_CLIENT_ID}"
    keyvaultName: "${AZURE_KEYVAULT_NAME}"
    tenantId: "${AZURE_TENANT_ID}"
    objects: |
      array:
        - |
          objectName: azure-openai-endpoint
          objectType: secret
          objectAlias: AZURE_OPENAI_EASTUS2_ENDPOINT
        - |
          objectName: azure-openai-api-key
          objectType: secret
          objectAlias: AZURE_OPENAI_EASTUS2_API_KEY
  # Sync KV secrets to a Kubernetes Secret so envFrom can reference them
  secretObjects:
    - secretName: dunkin-keyvault-synced
      type: Opaque
      data:
        - objectName: AZURE_OPENAI_EASTUS2_ENDPOINT
          key: AZURE_OPENAI_EASTUS2_ENDPOINT
        - objectName: AZURE_OPENAI_EASTUS2_API_KEY
          key: AZURE_OPENAI_EASTUS2_API_KEY
